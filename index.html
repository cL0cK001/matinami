<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Viewer</title>
    
    <style>
        body { margin: 0; overflow: hidden; background-color: #333; }
        
        #main-title {
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
            color: white; font-size: 36px; font-family: sans-serif; font-weight: bold;
            z-index: 10; text-shadow: 2px 2px 6px rgba(0, 0, 0, 0.8); pointer-events: none;
        }

        /* ★ 追加：ローディング画面のスタイル ★ */
        #loading-screen {
            position: absolute;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            background-color: #333; /* 背景と同じ色にして違和感をなくす */
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 20; /* タイトルよりも手前に表示 */
            color: white;
            font-size: 24px;
            font-family: sans-serif;
            font-weight: bold;
            transition: opacity 0.5s ease; /* ふんわり消えるアニメーション */
        }
    </style>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.157.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.157.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <h1 id="main-title">3D Viewer</h1>
    
    <div id="loading-screen">読み込み中... 0%</div>
    
    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // 1. シーン・カメラ・レンダラーの準備
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 0, 3);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.outputColorSpace = THREE.SRGBColorSpace;
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;

        // 2. ライトの設定
        const ambientLight = new THREE.AmbientLight(0xffffff, 1.5); 
        scene.add(ambientLight);
        const hemiLight = new THREE.HemisphereLight(0xffffff, 0x444444, 1.0);
        hemiLight.position.set(0, 20, 0);
        scene.add(hemiLight);
        const directionalLight = new THREE.DirectionalLight(0xffffff, 1.2); 
        directionalLight.position.set(5, 10, 7);
        scene.add(directionalLight);

        // 3. GLBファイルの読み込みとローディング処理
        const loader = new GLTFLoader();
        const loadingScreen = document.getElementById('loading-screen');
        
        loader.load(
            'mati.glb', 
            
            // ① 読み込みが完了したときの処理
            function (gltf) {
                const model = gltf.scene;
                const box = new THREE.Box3().setFromObject(model);
                const center = box.getCenter(new THREE.Vector3());
                model.position.x += (model.position.x - center.x);
                model.position.y += (model.position.y - center.y);
                model.position.z += (model.position.z - center.z);
                
                scene.add(model);

                // ローディング画面をふんわり消す
                loadingScreen.style.opacity = '0';
                setTimeout(() => {
                    loadingScreen.style.display = 'none';
                }, 500); // 0.5秒後に完全に非表示
            },
            
            // ② 読み込み中の処理（パーセントの更新）
            function (xhr) {
                if (xhr.lengthComputable) {
                    const percentComplete = Math.round((xhr.loaded / xhr.total) * 100);
                    loadingScreen.innerText = `読み込み中...`;
                } else {
                    // サーバーの設定等で全体量が分からない場合は文字だけ表示
                    loadingScreen.innerText = '読み込み中...';
                }
            },
            
            // ③ エラーが発生したときの処理
            function (error) {
                console.error('GLBモデルの読み込みエラー:', error);
                loadingScreen.innerText = '読み込みに失敗しました。ファイル名を確認してください。';
            }
        );

        // ウィンドウサイズ変更時の対応
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
