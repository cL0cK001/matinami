<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Viewer</title>
    
    <style>
        /* 背景色をダークグレーに設定 */
        body { margin: 0; overflow: hidden; background-color: #333; }
        
        /* タイトルの設定 */
        #main-title {
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
            color: white; font-size: 36px; font-family: sans-serif; font-weight: bold;
            z-index: 10; text-shadow: 2px 2px 6px rgba(0, 0, 0, 0.8); pointer-events: none;
        }
    </style>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.157.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.157.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <h1 id="main-title">3D Viewer</h1>
    
    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // 1. シーン・カメラ・レンダラーの準備
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 0, 3); // カメラの初期位置

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.outputColorSpace = THREE.SRGBColorSpace; // テクスチャの色を正しく出す
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true; // 操作を滑らかにする

        // 2. ライト（光）の設定（明るく綺麗に見せる）
        const ambientLight = new THREE.AmbientLight(0xffffff, 1.5); 
        scene.add(ambientLight);
        
        const hemiLight = new THREE.HemisphereLight(0xffffff, 0x444444, 1.0);
        hemiLight.position.set(0, 20, 0);
        scene.add(hemiLight);

        const directionalLight = new THREE.DirectionalLight(0xffffff, 1.2); 
        directionalLight.position.set(5, 10, 7);
        scene.add(directionalLight);

        // 3. GLBファイルの自動読み込み
        const loader = new GLTFLoader();
        
        // ★ 注意: GitHubにアップロードするGLBファイル名と一致させてください ★
        loader.load('miru.glb', function (gltf) {
            const model = gltf.scene;
            
            // モデルを画面の中心にぴったり合わせる
            const box = new THREE.Box3().setFromObject(model);
            const center = box.getCenter(new THREE.Vector3());
            model.position.x += (model.position.x - center.x);
            model.position.y += (model.position.y - center.y);
            model.position.z += (model.position.z - center.z);
            
            scene.add(model);
        }, undefined, function (error) {
            console.error('GLBモデルの読み込みエラー:', error);
        });

        // ウィンドウサイズ変更時の対応
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // 4. アニメーションループ
        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
